<!DOCTYPE html>
<html>
<head>
  <title>Login - RecruitSmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<section class="flex min-h-screen">

  <!-- ================= LEFT IMAGE ================= -->
  <div class="hidden md:flex w-1/2 relative">

    <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df"
    class="absolute inset-0 w-full h-full object-cover"/>

    <div class="absolute inset-0 bg-gradient-to-br from-purple-700/80 to-indigo-800/80"></div>

    <div class="relative z-10 flex flex-col justify-center items-center text-white text-center p-10">
      <h1 class="text-4xl font-bold mb-3">Welcome to RecruitSmart!</h1>
      <p class="text-lg opacity-90">
        Elevate Your Expertise <br/>
        Enhance Your Career 🚀
      </p>
    </div>

  </div>

  <!-- ================= RIGHT LOGIN ================= -->
  <div class="w-full md:w-1/2 flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">

      <h2 class="text-2xl font-bold text-center mb-4">Sign In</h2>

      <!-- ROLE SELECT -->
      <p class="text-center text-gray-500 mb-3">I am</p>

      <div class="flex justify-between mb-6">

        <div onclick="selectRole('admin')" id="adminCard"
        class="cursor-pointer border p-3 rounded-lg text-center w-24 hover:shadow">
          <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-10 mx-auto mb-1"/>
          <p class="text-sm">Admin</p>
        </div>

        <div onclick="selectRole('candidate')" id="candidateCard"
        class="cursor-pointer border p-3 rounded-lg text-center w-24 hover:shadow">
          <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="w-10 mx-auto mb-1"/>
          <p class="text-sm">Candidate</p>
        </div>

      </div>

      <!-- EMAIL -->
      <input id="email" type="email" placeholder="Email"
      class="w-full p-3 mb-3 border rounded-lg focus:ring-2 focus:ring-indigo-500"/>

      <!-- PASSWORD -->
      <input id="password" type="password" placeholder="Password"
      class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-indigo-500"/>

      <!-- LOGIN BUTTON -->
      <button onclick="loginUser()"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
        Sign In
      </button>

      <!-- SIGNUP -->
      <p class="text-sm text-center mt-4">
        Don’t have an account?
        <a href="signup.html" class="text-indigo-600 font-semibold">Signup</a>
      </p>

    </div>

  </div>

</section>

<script src="js/login.js"></script>

</body>
</html>
