<!DOCTYPE html>
<html>
<head>
    <title>Apply</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

    <h1 class="text-2xl font-bold mb-4">Apply for Job</h1>

    <p><b>Name:</b> <span id="name"></span></p>
    <p><b>Email:</b> <span id="email"></span></p>

    <input id="experience" placeholder="Experience (years)"
    class="border p-2 mt-3 w-full rounded" />

    <input id="skills" placeholder="Skills"
    class="border p-2 mt-3 w-full rounded" />

    <input type="file" id="resume" accept=".pdf"
    class="border p-2 mt-3 w-full rounded" />

    <button onclick="apply()" 
    class="bg-indigo-600 text-white px-4 py-2 mt-4 rounded">
        Submit Application
    </button>

    <script src="js/apply.js"></script>

</body>
</html>
