<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
   <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 p-6">

    <h1 id="title" class="text-2xl font-bold"></h1>

    <p id="desc" class="mt-2"></p>

    <p class="mt-2"><b>Experience:</b> <span id="exp"></span></p>
    <p><b>Salary:</b> <span id="salary"></span></p>
    <p><b>Location:</b> <span id="location"></span></p>

    <button onclick="goToApply()" 
    class="bg-green-600 text-white px-4 py-2 mt-4 rounded">
        Apply Now
    </button>

    <script src="js/job.js"></script>

</body>
</html>
